name: learn_mode_runtime_toggle
description: |
  v1.4 — Dashboard slide-toggle flips the Learn Mode categorizer
  worker active state without bouncing the host. Verifies persistence
  to learn_categorizer_state(key='runtime_enabled') and that the
  worker honors the flag on its next tick.
steps:
  - operator_prompt: |
      Open the dashboard. Confirm the LEARN MODE pill in the header
      shows current state. Click it to flip OFF.
    expected_envelopes:
      - type: api_response
        payload_match:
          path: /api/learn-mode/state
          method: POST
          enabled: false
    timeout_s: 5
  - operator_prompt: |
      Pre-publish a synthetic dialogue pair via sm_cli, then wait
      one categorizer tick interval (~5 s).
    expected_envelopes:
      - type: desktop_prompt
        payload_match:
          synthetic: true
      - type: user_reply
        payload_match:
          synthetic: true
    timeout_s: 5
  - operator_prompt: |
      Confirm NO new learn_patterns_canonical row appeared during
      the disabled window:
        sqlite3 .claude/gov.db "SELECT COUNT(*) FROM learn_patterns_canonical"
    expected_envelopes:
      - type: learn_categorizer_progress
        payload_match:
          drained: 0
    timeout_s: 10
  - operator_prompt: |
      Click the pill again to flip back ON; on the next tick the
      queued pair drains and the canonical projection updates.
    expected_envelopes:
      - type: api_response
        payload_match:
          path: /api/learn-mode/state
          enabled: true
      - type: learn_categorizer_progress
        payload_match:
          drained: 1
    timeout_s: 15
