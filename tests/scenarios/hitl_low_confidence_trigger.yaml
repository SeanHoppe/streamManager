name: hitl_low_confidence_trigger
description: |
  HITL fires on confidence below the session's hitl_floor (default 0.60).
  Verifies hitl_pending row created + `hitl_pending` envelope published
  + dashboard pane shows the prompt with the operator-resolvable buttons.
steps:
  - operator_prompt: |
      In Desktop, send an ambiguous request that the engine cannot
      resolve with high confidence:
        "Maybe refactor the cli_governance retry logic — or maybe leave it?"
    expected_envelopes:
      - type: governance_eval
      - type: governance_decision
        payload_match:
          action: SUGGEST
      - type: hitl_pending
        payload_match:
          trigger: low_confidence
    timeout_s: 30
  - operator_prompt: |
      In the dashboard HITL pane, click ALLOW on the pending row.
    expected_envelopes:
      - type: hitl_resolution
        payload_match:
          action: ALLOW
    timeout_s: 10
